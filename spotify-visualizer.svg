<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="400" height="100" rx="12" fill="#191414"/>
  
  <clipPath id="albumClip">
    <rect x="12" y="12" width="76" height="76" rx="6" />
  </clipPath>
  <image x="12" y="12" width="76" height="76" clip-path="url(#albumClip)" xlink:href="https://raw.githubusercontent.com/Rohan-Yelandur/Rohan-Yelandur/main/mindovermatter.jpg" />

  <text x="104" y="44" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Mind Over Matter</text>
  <text x="104" y="68" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#B3B3B3">Young the Giant</text>

  <g transform="translate(340, 50)">
    <rect x="0" y="-10" width="4" height="20" fill="#1DB954" rx="2">
      <animate attributeName="height" values="8;24;12;20;8" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="-4;-12;-6;-10;-4" dur="0.8s" repeatCount="indefinite" />
    </rect>
    <rect x="8" y="-10" width="4" height="20" fill="#1DB954" rx="2">
      <animate attributeName="height" values="16;8;24;12;16" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="y" values="-8;-4;-12;-6;-8" dur="0.6s" repeatCount="indefinite" />
    </rect>
    <rect x="16" y="-10" width="4" height="20" fill="#1DB954" rx="2">
      <animate attributeName="height" values="12;20;8;24;12" dur="0.9s" repeatCount="indefinite" />
      <animate attributeName="y" values="-6;-10;-4;-12;-6" dur="0.9s" repeatCount="indefinite" />
    </rect>
    <rect x="24" y="-10" width="4" height="20" fill="#1DB954" rx="2">
      <animate attributeName="height" values="20;12;16;8;20" dur="0.7s" repeatCount="indefinite" />
      <animate attributeName="y" values="-10;-6;-8;-4;-10" dur="0.7s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
